<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 250" font-family="Charter, Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#000000"/>
    </marker>
    <pattern id="hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#999999" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- (a) the hierarchy, built by iterated oracle access -->
  <ellipse cx="118" cy="106" rx="106" ry="78" fill="none" stroke="#000000" stroke-width="1"/>
  <text x="118" y="42" font-size="9" text-anchor="middle">Σ</text>
  <text x="126" y="46" font-size="7" text-anchor="middle">2</text>
  <text x="126" y="37" font-size="7" text-anchor="middle">p</text>

  <ellipse cx="110" cy="114" rx="74" ry="54" fill="none" stroke="#000000" stroke-width="1"/>
  <text x="106" y="74" font-size="9" text-anchor="middle">P</text>
  <text x="116" y="69" font-size="7" text-anchor="middle">NP</text>

  <ellipse cx="102" cy="124" rx="44" ry="32" fill="#eeeeee" stroke="#000000" stroke-width="1"/>
  <text x="102" y="128" font-size="9" text-anchor="middle">P</text>

  <text x="118" y="204" font-size="8" text-anchor="middle" font-style="italic">each level: NP with the one below as its oracle</text>
  <text x="118" y="216" font-size="8" text-anchor="middle" font-style="italic">BGS '75 — oracles exist both ways, so the technique has a limit</text>

  <line x1="248" y1="24" x2="248" y2="200" stroke="#cccccc" stroke-width="0.6"/>

  <!-- (b) what comes back -->
  <text x="356" y="46" font-size="8" text-anchor="middle" font-style="italic">a decision oracle returns</text>
  <text x="356" y="74" font-size="15" text-anchor="middle">0 / 1</text>
  <text x="356" y="90" font-size="8" text-anchor="middle" font-style="italic">no direction for a learner</text>

  <line x1="266" y1="106" x2="446" y2="106" stroke="#cccccc" stroke-width="0.6"/>

  <text x="356" y="126" font-size="8" text-anchor="middle" font-style="italic">ours returns</text>
  <rect x="300" y="136" width="28" height="16" fill="#eeeeee" stroke="#000000" stroke-width="0.6"/>
  <rect x="328" y="136" width="28" height="16" fill="#ffffff" stroke="#000000" stroke-width="0.6"/>
  <rect x="356" y="136" width="28" height="16" fill="#eeeeee" stroke="#000000" stroke-width="0.6"/>
  <rect x="384" y="136" width="28" height="16" fill="#ffffff" stroke="#000000" stroke-width="0.6"/>
  <path d="M 356 158 Q 368 168 356 178" fill="none" stroke="#000000" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="380" y="174" font-size="11">∇</text>
  <text x="356" y="196" font-size="8" text-anchor="middle" font-style="italic">a value per law, plus direction</text>

  <text x="20" y="228" font-size="8" font-style="italic">Figure 3. Oracles stratify difficulty — the polynomial hierarchy is iterated oracle access. Ours is a</text>
  <text x="20" y="240" font-size="8" font-style="italic">valuation oracle, not a decision oracle: collapsing to a bit would destroy the training signal.</text>
</svg>
