# Assembly manifest for the docs tree.
#
# Each entry under `monoliths` regenerates one top-level document by
# concatenating the listed atomic files in order. Each entry under
# `bundles` defines a named LLM-context subset.
#
# `assemble.py` consumes this file. `lint.py` cross-checks that every
# file under architecture/, implementation/, mvp/ appears in exactly
# one monolith.

monoliths:

  architecture:
    output: architecture.md
    title: n-Op Architecture
    sources:
      - architecture/01-purpose.md
      - architecture/02-libraries.md
      - architecture/03-inputs.md
