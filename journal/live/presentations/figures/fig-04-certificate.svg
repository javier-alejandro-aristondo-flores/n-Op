<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 320" font-family="Charter, Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#000000"/>
    </marker>
    <pattern id="hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#999999" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- ============ (a) partial witness ============ -->
  <text x="26" y="34" font-size="9" font-style="italic">(a)  partial witness — the checker must detour through a solve</text>

  <!-- the witness, as a strip of channels -->
  <rect x="26" y="52" width="118" height="26" fill="#cccccc" stroke="#000000" stroke-width="0.6"/>
  <rect x="144" y="52" width="80" height="26" fill="none" stroke="#000000" stroke-width="0.6" stroke-dasharray="1 2"/>
  <text x="85" y="94" font-size="8" text-anchor="middle" font-style="italic">structure</text>
  <text x="184" y="94" font-size="8" text-anchor="middle" font-style="italic">electronic — absent</text>

  <!-- the detour -->
  <path d="M 230 58 Q 268 22 302 40" fill="none" stroke="#000000" stroke-width="1" marker-end="url(#a)"/>
  <ellipse cx="356" cy="52" rx="52" ry="22" fill="url(#hatch)" stroke="#000000" stroke-width="1"/>
  <text x="356" y="56" font-size="9" text-anchor="middle">solve</text>
  <path d="M 410 44 Q 444 22 472 40" fill="none" stroke="#000000" stroke-width="1" marker-end="url(#a)"/>

  <circle cx="494" cy="62" r="19" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="494" y="66" font-size="8" text-anchor="middle">check</text>

  <text x="284" y="94" font-size="8" font-style="italic">expensive — back in the hard class</text>

  <line x1="26" y1="132" x2="514" y2="132" stroke="#cccccc" stroke-width="0.6"/>

  <!-- ============ (b) complete witness ============ -->
  <text x="26" y="166" font-size="9" font-style="italic">(b)  complete witness — the checker only checks</text>

  <rect x="26" y="184" width="118" height="26" fill="#cccccc" stroke="#000000" stroke-width="0.6"/>
  <rect x="144" y="184" width="80" height="26" fill="#eeeeee" stroke="#000000" stroke-width="0.6"/>
  <text x="85" y="226" font-size="8" text-anchor="middle" font-style="italic">structure</text>
  <text x="184" y="226" font-size="8" text-anchor="middle" font-style="italic">electronic — supplied</text>

  <!-- one gliding pass : the load-bearing path -->
  <path d="M 232 194 Q 360 166 470 190" fill="none" stroke="#000000" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="352" y="166" font-size="8" text-anchor="middle" font-style="italic">one pass</text>

  <circle cx="494" cy="196" r="19" fill="#ffffff" stroke="#000000" stroke-width="1.6"/>
  <text x="494" y="200" font-size="8" text-anchor="middle">check</text>

  <text x="284" y="226" font-size="8" font-style="italic">cheap — verification stays easy</text>

  <!-- caption -->
  <line x1="26" y1="266" x2="514" y2="266" stroke="#cccccc" stroke-width="0.6"/>
  <text x="26" y="284" font-size="8" font-style="italic">Figure 4. Verification is cheap only if the witness is complete. Withhold a channel and the checker</text>
  <text x="26" y="298" font-size="8" font-style="italic">must solve for it. Score-not-solve is a complexity constraint, not a preference.</text>
</svg>
