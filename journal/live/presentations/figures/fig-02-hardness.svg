<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 256" font-family="Charter, Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#000000"/>
    </marker>
    <pattern id="hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#999999" stroke-width="0.6"/>
    </pattern>
  </defs>

  <ellipse cx="210" cy="118" rx="195" ry="98" fill="none" stroke="#000000" stroke-width="1"/>
  <text x="210" y="34" font-size="9" text-anchor="middle">QMA</text>

  <ellipse cx="180" cy="126" rx="135" ry="72" fill="none" stroke="#000000" stroke-width="1"/>
  <text x="180" y="68" font-size="9" text-anchor="middle">NP</text>

  <ellipse cx="145" cy="140" rx="72" ry="42" fill="#eeeeee" stroke="#000000" stroke-width="1"/>
  <text x="145" y="122" font-size="9" text-anchor="middle">P</text>

  <circle cx="138" cy="148" r="3" fill="#000000"/>
  <text x="138" y="162" font-size="8" text-anchor="middle" font-style="italic">check a candidate</text>

  <circle cx="252" cy="106" r="3" fill="#000000"/>
  <text x="252" y="96" font-size="8" text-anchor="middle">ground-state search</text>
  <text x="252" y="86" font-size="8" text-anchor="middle" font-style="italic">NP-hard · Barahona '82</text>

  <circle cx="348" cy="150" r="3" fill="#000000"/>
  <text x="348" y="164" font-size="8" text-anchor="middle">local Hamiltonian</text>
  <text x="348" y="175" font-size="8" text-anchor="middle" font-style="italic">QMA-complete · Kitaev</text>

  <path d="M 244 112 Q 192 142 152 148" fill="none" stroke="#000000" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="206" y="130" font-size="8" text-anchor="middle">same object, other direction</text>

  <text x="20" y="232" font-size="8" font-style="italic">Figure 2. Producing a ground state sits in the hard classes; checking a supplied one sits in P.</text>
  <text x="20" y="244" font-size="8" font-style="italic">Hardware does not move that boundary. The asymmetry is the design premise.</text>
</svg>
