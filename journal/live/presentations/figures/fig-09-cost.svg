<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 248" font-family="Charter, Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#000000"/>
    </marker>
    <pattern id="hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#999999" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- (a) the admissible region -->
  <text x="30" y="30" font-size="8" font-style="italic">(a)  every runtime operation lives under the bound</text>

  <path d="M 44 176 Q 112 132 226 114 L 226 176 Z" fill="#eeeeee" stroke="none"/>

  <line x1="44" y1="176" x2="238" y2="176" stroke="#000000" stroke-width="0.6" marker-end="url(#a)"/>
  <line x1="44" y1="176" x2="44" y2="46" stroke="#000000" stroke-width="0.6" marker-end="url(#a)"/>
  <text x="240" y="188" font-size="8" font-style="italic">n</text>
  <text x="40" y="44" font-size="8" text-anchor="end" font-style="italic">cost</text>

  <line x1="48" y1="174" x2="216" y2="56" stroke="#000000" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="214" y="52" font-size="8" text-anchor="end" font-style="italic">O(n) — excluded</text>

  <path d="M 44 176 Q 112 132 226 114" fill="none" stroke="#000000" stroke-width="1.6"/>
  <text x="196" y="106" font-size="8">O(log n)</text>

  <circle cx="82"  cy="166" r="2" fill="#000000"/>
  <circle cx="120" cy="156" r="2" fill="#000000"/>
  <circle cx="160" cy="148" r="2" fill="#000000"/>
  <circle cx="198" cy="140" r="2" fill="#000000"/>

  <text x="134" y="206" font-size="8" text-anchor="middle" font-style="italic">set membership · map lookup · BDD evaluate · verdict meet</text>
  <text x="134" y="218" font-size="8" text-anchor="middle" font-style="italic">and none of them calls a solver</text>

  <line x1="266" y1="24" x2="266" y2="222" stroke="#cccccc" stroke-width="0.6"/>

  <!-- (b) the adjoint -->
  <text x="288" y="30" font-size="8" font-style="italic">(b)  the cost of one gradient</text>

  <line x1="300" y1="176" x2="500" y2="176" stroke="#000000" stroke-width="0.6" marker-end="url(#a)"/>
  <line x1="300" y1="176" x2="300" y2="46" stroke="#000000" stroke-width="0.6" marker-end="url(#a)"/>
  <text x="502" y="188" font-size="8" font-style="italic">N</text>
  <text x="296" y="44" font-size="8" text-anchor="end" font-style="italic">cost</text>

  <line x1="304" y1="174" x2="478" y2="58" stroke="#000000" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="476" y="52" font-size="8" text-anchor="end" font-style="italic">naive — tapes all N</text>

  <line x1="304" y1="138" x2="486" y2="138" stroke="#000000" stroke-width="1.6"/>
  <text x="396" y="130" font-size="8" text-anchor="middle">implicit adjoint — one linear solve</text>

  <text x="396" y="206" font-size="8" text-anchor="middle" font-style="italic">flat in N, at a converged fixed point</text>

  <text x="20" y="238" font-size="8" font-style="italic">Figure 9. Both are design commitments, stated so they can be falsified — not measurements. Nothing is implemented yet.</text>
</svg>
