      - architecture/12-cert.md
      - architecture/13-applicability.md
      - architecture/14-topology.md
      - architecture/15-gamma-hat.md
      - architecture/16-pino-bridge.md
      - architecture/17-out-of-scope.md
      - architecture/18-open-decisions.md
      - architecture/19-coupling-structure.md
      - architecture/20-representations.md

  implementation:
    output: implementation-plan.md
    title: n-Op Implementation Plan
    sources:
      - implementation/01-principles.md
      - implementation/02-methods.md
      - implementation/03-templates.md
      - implementation/04-formulas.md
      - implementation/05-bundles.md
      - implementation/06-compositions.md
      - implementation/07-residual-factory.md
      - implementation/08-cert-detail.md
      - implementation/09-cross-cutting.md
      - implementation/10-build-sequence.md
      - implementation/11-verification.md

  mvp:
