<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 330" font-family="Charter, Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#000000"/>
    </marker>
    <pattern id="hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#999999" stroke-width="0.6"/>
    </pattern>
  </defs>

  <text x="26" y="32" font-size="9" font-style="italic">a decision diagram over the material — straight edges, by convention</text>

  <!-- root -->
  <circle cx="268" cy="76" r="24" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="268" y="80" font-size="8" text-anchor="middle">polar?</text>

  <!-- internal -->
  <circle cx="150" cy="168" r="24" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="150" y="172" font-size="8" text-anchor="middle">gapped?</text>

  <circle cx="386" cy="168" r="24" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="386" y="172" font-size="8" text-anchor="middle">doped?</text>

  <!-- edges : straight, BDD convention -->
  <line x1="250" y1="92" x2="168" y2="152" stroke="#000000" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="286" y1="92" x2="368" y2="152" stroke="#000000" stroke-width="1"/>

  <line x1="134" y1="186" x2="106" y2="222" stroke="#000000" stroke-width="1.6" stroke-dasharray="4 2"/>
  <line x1="166" y1="186" x2="278" y2="224" stroke="#000000" stroke-width="1"/>
  <line x1="386" y1="192" x2="330" y2="224" stroke="#000000" stroke-width="1"/>

  <!-- terminals -->
  <circle cx="92" cy="248" r="26" fill="none" stroke="#000000" stroke-width="1.6" stroke-dasharray="1 2"/>
  <text x="92" y="252" font-size="9" text-anchor="middle">absent</text>

  <circle cx="304" cy="248" r="26" fill="#eeeeee" stroke="#000000" stroke-width="1"/>
  <text x="304" y="252" font-size="9" text-anchor="middle">present</text>

  <text x="92" y="292" font-size="8" text-anchor="middle" font-style="italic">no zero, no NaN —</text>
  <text x="92" y="305" font-size="8" text-anchor="middle" font-style="italic">the key isn't there</text>

  <text x="420" y="248" font-size="8" font-style="italic">solid = true</text>
  <text x="420" y="262" font-size="8" font-style="italic">dashed = false</text>

  <text x="24" y="326" font-size="8" font-style="italic">Figure 10. A check the oracle can't stand behind isn't in the compiled kernel at all.</text>
</svg>
