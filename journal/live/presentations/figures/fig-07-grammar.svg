<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 252" font-family="Charter, Georgia, 'Times New Roman', serif">
  <defs>
    <pattern id="hatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#999999" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- root -->
  <text x="260" y="30" font-size="12" text-anchor="middle">κ_lattice</text>
  <text x="260" y="42" font-size="7.5" text-anchor="middle" font-style="italic">requested observable</text>

  <!-- root → level 2 -->
  <line x1="248" y1="50" x2="146" y2="72" stroke="#000000" stroke-width="1"/>
  <line x1="272" y1="50" x2="358" y2="72" stroke="#000000" stroke-width="1"/>

  <text x="130" y="84" font-size="9" text-anchor="middle">SpectralAggregateOf</text>
  <text x="130" y="95" font-size="7.5" text-anchor="middle" font-style="italic">template</text>

  <text x="370" y="84" font-size="9" text-anchor="middle">kinetic-evolution</text>
  <text x="370" y="95" font-size="7.5" text-anchor="middle" font-style="italic">method</text>

  <!-- level 2 → leaves -->
  <line x1="108" y1="103" x2="66" y2="130" stroke="#000000" stroke-width="1"/>
  <line x1="152" y1="103" x2="196" y2="130" stroke="#000000" stroke-width="1"/>
  <line x1="370" y1="103" x2="370" y2="130" stroke="#000000" stroke-width="1"/>

  <text x="64" y="142" font-size="8" text-anchor="middle">phonon-dispersion</text>
  <text x="64" y="153" font-size="7.5" text-anchor="middle" font-style="italic">row 9</text>

  <text x="196" y="142" font-size="8" text-anchor="middle">phonon-DOS</text>
  <text x="196" y="153" font-size="7.5" text-anchor="middle" font-style="italic">row 10</text>

  <text x="370" y="142" font-size="8" text-anchor="middle">single-mode-rta-lattice-kappa</text>
  <text x="370" y="153" font-size="7.5" text-anchor="middle" font-style="italic">row 25</text>

  <!-- the pruned branch -->
  <line x1="392" y1="103" x2="446" y2="172" stroke="#000000" stroke-width="1.6" stroke-dasharray="1 2"/>
  <text x="444" y="186" font-size="8" text-anchor="middle">polar-optical-scattering-rate</text>
  <text x="444" y="197" font-size="7.5" text-anchor="middle" font-style="italic">pruned — ¬ is-polar(diamond)</text>

  <text x="20" y="224" font-size="8" font-style="italic">Figure 7. An observable is a sentence in the closed grammar; terminals are registry rows. Branches whose</text>
  <text x="20" y="236" font-size="8" font-style="italic">applicability predicate is false are pruned at compile time — decidably, and with a reason — so an</text>
  <text x="20" y="248" font-size="8" font-style="italic">ill-posed request never reaches the kernel.</text>
</svg>
