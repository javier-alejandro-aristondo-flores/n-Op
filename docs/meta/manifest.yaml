    title: n-Op Diamond MVP Slice
    sources:
      - mvp/01-system.md
      - mvp/02-gamma-budget.md
      - mvp/03-capabilities.md
      - mvp/04-in-mvp-vs-deferred.md
      - mvp/05-decisions-forced.md
      - mvp/06-build-order.md

